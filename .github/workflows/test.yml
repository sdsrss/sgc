name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  dispatcher-eval:
    name: dispatcher + eval
    runs-on: ubuntu-latest
    env:
      # Skip chromium download — browse tests are not in this scope and
      # the binary is ~100MB from the MS CDN (adds ~9 min on a clean cache).
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node (for npm ci)
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          # Cache npm's ~/.npm using the lockfile as the key.
          cache: npm

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"

      - name: Install dependencies
        # `npm ci` because the repo tracks package-lock.json (not bun.lock).
        # Bun still reads package-lock.json fine at runtime.
        run: npm ci

      - name: Run dispatcher + eval tests
        id: run_tests
        run: |
          set -o pipefail
          bun test tests/dispatcher tests/eval 2>&1 | tee test-output.log

      - name: Publish test output to step summary (on failure)
        if: always() && steps.run_tests.outcome == 'failure'
        run: |
          {
            echo "## bun test output (failed run)"
            echo ""
            echo '```'
            tail -200 test-output.log || echo "(no test-output.log captured)"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
